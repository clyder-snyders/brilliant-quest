    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brilliant Quest" />
    <meta name="twitter:description" content="Learn programming through 50 engaging puzzle levels" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%233B82F6' width='100' height='100'/><circle cx='30' cy='30' r='15' fill='%23FBBF24'/><circle cx='70' cy='30' r='15' fill='%23FBBF24'/><circle cx='30' cy='70' r='15' fill='%23FBBF24'/><circle cx='70' cy='70' r='15' fill='%23FBBF24'/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233B82F6' width='180' height='180'/><circle cx='60' cy='60' r='18' fill='%23FBBF24'/><circle cx='120' cy='60' r='18' fill='%23FBBF24'/><circle cx='60' cy='120' r='18' fill='%23FBBF24'/><circle cx='120' cy='120' r='18' fill='%23FBBF24'/><circle cx='90' cy='90' r='14' fill='white'/></svg>" />
    
    <!-- Disable tap highlight on mobile -->
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              console.log('Service Worker registered successfully');
              
              // Check for updates periodically
              setInterval(() => {
                reg.update();
              }, 60000); // Check for updates every 60 seconds
            })
            .catch((err) => console.log('Service Worker registration failed:', err));
        });

        // Listen for service worker updates
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('Service Worker updated, page refresh recommended');
          // You can trigger a page refresh or show a notification to the user
        });
      }

      // Prevent horizontal scroll on mobile
      document.body.style.overflowX = 'hidden';
    </script>
  </body>
</html>
