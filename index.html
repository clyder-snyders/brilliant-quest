<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brilliant OS" />
    <meta name="theme-color" content="#3B82F6" />
    
    <title>Brilliant OS — Learn Programming Through Play</title>
    <meta name="description" content="Master programming concepts through 50 interactive coding puzzles. Learn sequencing, loops, conditionals, functions, and more. Perfect for students aged 8-18." />
    
    <meta property="og:title" content="Brilliant OS — Learn Programming Through Play" />
    <meta property="og:description" content="Master programming through 50 fun puzzle levels. Free forever." />
    <meta property="og:type" content="website" />
    
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    
    <style>* { -webkit-tap-highlight-color: transparent; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var isInIframe = false;
        try { isInIframe = window.self !== window.top; } catch(e) { isInIframe = true; }
        var isPreview = window.location.hostname.includes('id-preview--') || window.location.hostname.includes('lovableproject.com');

        if (!isInIframe && !isPreview) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js')
              .then(function(reg) { setInterval(function() { reg.update(); }, 60000); })
              .catch(function(err) { console.log('SW failed:', err); });
          });
        } else {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
      }
      document.body.style.overflowX = 'hidden';
    </script>
  </body>
</html>
