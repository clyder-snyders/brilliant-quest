  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support — only in production
      if ('serviceWorker' in navigator) {
        var isInIframe = false;
        try { isInIframe = window.self !== window.top; } catch(e) { isInIframe = true; }
        var isPreview = window.location.hostname.includes('id-preview--') || window.location.hostname.includes('lovableproject.com');

        if (!isInIframe && !isPreview) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js')
              .then(function(reg) {
                console.log('Service Worker registered');
                setInterval(function() { reg.update(); }, 60000);
              })
              .catch(function(err) { console.log('SW registration failed:', err); });
          });

          navigator.serviceWorker.addEventListener('controllerchange', function() {
            console.log('Service Worker updated');
          });
        } else {
          // Unregister any existing service workers in preview/iframe
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
      }

      document.body.style.overflowX = 'hidden';
    </script>
  </body>
